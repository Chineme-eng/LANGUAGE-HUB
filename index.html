<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expat Language Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE6D6;
    --cream-darker: #E0D8C4;
    --ink: #1A1410;
    --ink-soft: #3D3028;
    --ink-muted: #7A6A5A;
    --orange: #E8722A;
    --orange-light: #F0924A;
    --orange-pale: #FDE8D4;
    --purple: #6B4F8A;
    --purple-light: #8B6FAA;
    --purple-pale: #EDE8F5;
    --blue: #3A6B8A;
    --blue-light: #5A8BAA;
    --blue-pale: #E4EEF5;
    --green: #4A7A5A;
    --green-light: #6A9A7A;
    --green-pale: #E4F0E8;
    --teal: #3A7A78;
    --teal-pale: #E4F0EF;
    --rose: #8A4A5A;
    --rose-pale: #F5E4E8;
    --gold: #A07830;
    --gold-pale: #F5EDD4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(232,114,42,0.04) 40px,
      rgba(232,114,42,0.04) 41px
    );
    pointer-events: none;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--cream);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  header h1 span { color: var(--orange); }
  header p {
    color: var(--ink-muted);
    font-size: 1.05rem;
    margin-top: 0.5rem;
    font-style: italic;
    color: #9A8A7A;
  }

  /* LANGUAGE TABS */
  .lang-nav {
    background: var(--ink-soft);
    padding: 0 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .lang-btn {
    background: none;
    border: none;
    color: #9A8A7A;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .lang-btn:hover { color: var(--cream); }
  .lang-btn.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }

  /* GOOGLE TRANSLATE BAR */
  .translate-bar {
    background: var(--cream-darker);
    border-bottom: 2px solid var(--cream-dark);
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .translate-bar label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #google_translate_element { display: inline-block; }
  .goog-te-gadget-simple {
    background: white !important;
    border: 1.5px solid var(--orange) !important;
    border-radius: 4px !important;
    padding: 2px 8px !important;
    font-family: 'Crimson Pro', serif !important;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* LANGUAGE PANEL */
  .lang-panel { display: none; }
  .lang-panel.active { display: block; }

  /* LANGUAGE HERO */
  .lang-hero {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    padding: 1.5rem 2rem;
    background: var(--ink);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .lang-hero::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(232,114,42,0.08);
  }
  .lang-flag { font-size: 3rem; line-height: 1; }
  .lang-hero-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
  }
  .lang-hero-text p {
    color: #8A7A6A;
    font-style: italic;
    font-size: 1rem;
    margin-top: 0.25rem;
  }
  .lang-hero-text .native-name {
    color: var(--orange);
    font-size: 1.4rem;
    font-weight: 600;
    font-style: normal;
  }

  /* SECTION TABS (Words / Sentences / Emergency) */
  .section-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .sec-btn {
    background: var(--cream-dark);
    border: 2px solid var(--cream-darker);
    color: var(--ink-muted);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sec-btn:hover { border-color: var(--orange); color: var(--orange); }
  .sec-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  .section-content { display: none; }
  .section-content.active { display: block; }

  /* CATEGORY LABEL */
  .category-block { margin-bottom: 2.5rem; }
  .category-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 0.3rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }

  /* CAT COLORS */
  .cat-survival  { background: var(--rose-pale);   color: var(--rose);   }
  .cat-numbers   { background: var(--gold-pale);   color: var(--gold);   }
  .cat-food      { background: var(--green-pale);  color: var(--green);  }
  .cat-transport { background: var(--blue-pale);   color: var(--blue);   }
  .cat-social    { background: var(--purple-pale); color: var(--purple); }
  .cat-money     { background: var(--teal-pale);   color: var(--teal);   }
  .cat-housing   { background: var(--orange-pale); color: var(--orange); }
  .cat-health    { background: var(--rose-pale);   color: var(--rose);   }
  .cat-time      { background: var(--gold-pale);   color: var(--gold);   }
  .cat-misc      { background: var(--cream-darker); color: var(--ink-soft); }

  /* WORD GRID */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.75rem;
  }
  .word-card {
    background: white;
    border: 1.5px solid var(--cream-darker);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    transition: all 0.18s;
    cursor: default;
  }
  .word-card:hover {
    border-color: var(--orange);
    box-shadow: 0 3px 12px rgba(232,114,42,0.12);
    transform: translateY(-1px);
  }
  .word-en {
    font-weight: 600;
    color: var(--ink);
    font-size: 1rem;
    min-width: 80px;
  }
  .word-translated {
    font-size: 1.05rem;
    color: var(--purple);
    font-weight: 600;
    text-align: right;
    flex: 1;
  }
  .word-roman {
    font-size: 0.8rem;
    color: var(--ink-muted);
    font-style: italic;
    text-align: right;
  }
  .word-right { text-align: right; }
  .speak-btn {
    background: var(--orange-pale);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    color: var(--orange);
  }
  .speak-btn:hover { background: var(--orange); color: white; transform: scale(1.1); }

  /* SENTENCE LIST */
  .sentence-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .sentence-card {
    background: white;
    border: 1.5px solid var(--cream-darker);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    transition: all 0.18s;
  }
  .sentence-card:hover {
    border-color: var(--blue);
    box-shadow: 0 3px 12px rgba(58,107,138,0.1);
  }
  .sentence-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--orange);
    min-width: 32px;
    padding-top: 2px;
  }
  .sentence-body { flex: 1; }
  .sentence-en { font-weight: 600; color: var(--ink); margin-bottom: 0.25rem; }
  .sentence-tr { color: var(--blue); font-size: 1.05rem; font-weight: 600; }
  .sentence-roman { font-size: 0.85rem; color: var(--ink-muted); font-style: italic; margin-top: 0.15rem; }

  /* EMERGENCY */
  .emergency-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .emergency-card {
    background: linear-gradient(135deg, #FFF5F0 0%, white 100%);
    border: 2px solid var(--orange);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    transition: all 0.18s;
  }
  .emergency-card:hover { box-shadow: 0 4px 16px rgba(232,114,42,0.2); }
  .emergency-en { font-weight: 700; color: var(--ink); margin-bottom: 0.3rem; font-size: 1.05rem; }
  .emergency-tr { color: var(--orange); font-size: 1.1rem; font-weight: 700; }
  .emergency-roman { font-size: 0.85rem; color: var(--ink-muted); font-style: italic; margin-top: 0.15rem; }
  .emergency-speak {
    background: var(--orange);
    border: none;
    border-radius: 6px;
    color: white;
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    margin-top: 0.6rem;
    transition: all 0.15s;
  }
  .emergency-speak:hover { background: var(--orange-light); transform: scale(1.02); }

  /* CULTURAL NOTES */
  .cultural-notes {
    background: var(--purple-pale);
    border-left: 4px solid var(--purple);
    border-radius: 0 10px 10px 0;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }
  .cultural-notes h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 0.75rem;
    font-size: 1.15rem;
  }
  .cultural-notes ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  .cultural-notes li::before { content: '✦  '; color: var(--purple-light); }
  .cultural-notes li { color: var(--ink-soft); font-size: 0.95rem; }

  /* FAVORITES */
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--cream-darker);
    transition: color 0.15s;
    padding: 0;
    line-height: 1;
  }
  .fav-btn.faved { color: var(--orange); }
  .fav-btn:hover { color: var(--orange-light); }

  /* SEARCH */
  .search-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: white;
    border: 2px solid var(--cream-darker);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--orange); }
  .search-input::placeholder { color: var(--ink-muted); }

  /* FOOTER */
  footer {
    background: var(--ink);
    color: #6A5A4A;
    text-align: center;
    padding: 1.5rem;
    font-size: 0.9rem;
    font-style: italic;
  }
  footer span { color: var(--orange); }

  /* SCROLL ANIMATION */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .lang-panel.active .word-card,
  .lang-panel.active .sentence-card,
  .lang-panel.active .emergency-card {
    animation: fadeUp 0.3s ease both;
  }

  @media (max-width: 600px) {
    header { padding: 1.5rem 1rem; }
    main { padding: 1.25rem 0.75rem 3rem; }
    .lang-btn { padding: 0.65rem 0.65rem; font-size: 0.82rem; }
    .word-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>
  <h1>Expat <span>Language</span> Guide</h1>
  <p>200 words · 50 sentences · 10 languages — your passport to anywhere</p>
</header>

<!-- GOOGLE TRANSLATE -->
<div class="translate-bar">
  <label>🌐 Translate Page:</label>
  <div id="google_translate_element"></div>
</div>

<!-- LANGUAGE NAV -->
<nav class="lang-nav" id="langNav">
  <button class="lang-btn active" onclick="switchLang('th')">🇹🇭 Thai</button>
  <button class="lang-btn" onclick="switchLang('fr')">🇫🇷 French</button>
  <button class="lang-btn" onclick="switchLang('es')">🇪🇸 Spanish</button>
  <button class="lang-btn" onclick="switchLang('nl')">🇳🇱 Dutch</button>
  <button class="lang-btn" onclick="switchLang('ko')">🇰🇷 Korean</button>
  <button class="lang-btn" onclick="switchLang('vi')">🇻🇳 Vietnamese</button>
  <button class="lang-btn" onclick="switchLang('id')">🇮🇩 Indonesian</button>
  <button class="lang-btn" onclick="switchLang('ja')">🇯🇵 Japanese</button>
  <button class="lang-btn" onclick="switchLang('pt')">🇧🇷 Portuguese</button>
  <button class="lang-btn" onclick="switchLang('zh')">🇨🇳 Mandarin</button>
</nav>

<main id="mainContent"></main>

<footer>Built for the <span>wandering soul</span> — free forever, hosted on GitHub Pages.</footer>

  new google.translate.TranslateElement({
    pageLanguage: 'en',

    layout: google.translate.TranslateElement.InlineLayout.SIMPLE

}
</script>

// ─────────────────────────────────────────────
// FAVORITES
// ─────────────────────────────────────────────
let favorites = JSON.parse(localStorage.getItem('expatFavs') || '{}');
function saveFavs() { localStorage.setItem('expatFavs', JSON.stringify(favorites)); }
function toggleFav(id, btn) {
  favorites[id] = !favorites[id];
  if (!favorites[id]) delete favorites[id];
  btn.classList.toggle('faved', !!favorites[id]);
  btn.title = favorites[id] ? 'Unfavorite' : 'Favorite';
  saveFavs();
}

// ─────────────────────────────────────────────
// SPEECH
// ─────────────────────────────────────────────
function speak(text, langCode) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = langCode;
  u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function filterWords(langCode, query) {
  const panel = document.getElementById('panel-' + langCode);
  if (!panel) return;
  const cards = panel.querySelectorAll('.word-card');
  const q = query.toLowerCase();
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

// ─────────────────────────────────────────────
// BUILD HTML
// ─────────────────────────────────────────────
function buildPanel(code) {
  const L = LANGS[code];
  const catHtml = Object.entries(L.categories).map(([catName, catData]) => {
    const wordsHtml = catData.words.map((w, i) => {
      const id = `${code}-${catName}-${i}`;
      const isFaved = !!favorites[id];
      const romanRow = w.rom ? `<div class="word-roman">${w.rom}</div>` : '';
      return `<div class="word-card">
        <span class="word-en">${w.en}</span>
        <div class="word-right">
          <div class="word-translated">${w.tr}</div>
          ${romanRow}
        </div>
        <button class="speak-btn" onclick="speak('${w.tr.replace(/'/g,"\\'")}','${L.voiceCode}')" title="Pronounce">🔊</button>
        <button class="fav-btn ${isFaved?'faved':''}" onclick="toggleFav('${id}',this)" title="${isFaved?'Unfavorite':'Favorite'}">★</button>
      </div>`;
    }).join('');
    return `<div class="category-block">
      <div class="category-label ${catData.cls}">${catName}</div>
      <div class="word-grid">${wordsHtml}</div>
    </div>`;
  }).join('');

  const sentHtml = L.sentences.map((s, i) => {
    const romanRow = s.rom ? `<div class="sentence-roman">${s.rom}</div>` : '';
    return `<div class="sentence-card">
      <div class="sentence-num">${String(i+1).padStart(2,'0')}</div>
      <div class="sentence-body">
        <div class="sentence-en">${s.en}</div>
        <div class="sentence-tr">${s.tr}</div>
        ${romanRow}
      </div>
      <button class="speak-btn" onclick="speak('${s.tr.replace(/'/g,"\\'")}','${L.voiceCode}')" title="Pronounce">🔊</button>
    </div>`;
  }).join('');

  const emergHtml = L.emergency.map(e => {
    const romanRow = e.rom ? `<div class="emergency-roman">${e.rom}</div>` : '';
    return `<div class="emergency-card">
      <div class="emergency-en">${e.en}</div>
      <div class="emergency-tr">${e.tr}</div>
      ${romanRow}
      <button class="emergency-speak" onclick="speak('${e.tr.replace(/'/g,"\\'")}','${L.voiceCode}')">🔊 Say it</button>
    </div>`;
  }).join('');

  const needsRoman = ['th','ko','ja','zh','vi'].includes(code);
  const romanNote = needsRoman ? `<p style="color:var(--ink-muted);font-style:italic;font-size:0.9rem;margin-bottom:1rem;">💡 Romanization shown below each word to help with pronunciation.</p>` : '';

  return `<div id="panel-${code}" class="lang-panel${code==='th'?' active':''}">
    <div class="lang-hero">
      <div class="lang-flag">${L.flag}</div>
      <div class="lang-hero-text">
        <div class="native-name">${L.native}</div>
        <h2>${L.name}</h2>
        <p>${L.tip}</p>
      </div>
    </div>

    <div class="cultural-notes">
      <h3>✦ Cultural Tips</h3>
      <ul>${L.cultural.map(c=>`<li>${c}</li>`).join('')}</ul>
    </div>

    <div class="section-tabs">
      <button class="sec-btn active" onclick="switchSection('${code}','words',this)">📖 200 Words</button>
      <button class="sec-btn" onclick="switchSection('${code}','sentences',this)">💬 50 Sentences</button>
      <button class="sec-btn" onclick="switchSection('${code}','emergency',this)">🚨 Emergency</button>
    </div>

    <div id="sec-${code}-words" class="section-content active">
      ${romanNote}
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search words..." oninput="filterWords('${code}',this.value)">
      </div>
      ${catHtml}
    </div>

    <div id="sec-${code}-sentences" class="section-content">
      <div class="sentence-list">${sentHtml}</div>
    </div>

    <div id="sec-${code}-emergency" class="section-content">
      <p style="color:var(--rose);font-weight:700;margin-bottom:1rem;font-size:1.05rem;">⚠️ Save this page offline for emergencies. Tap 🔊 to hear the phrase spoken aloud.</p>
      <div class="emergency-grid">${emergHtml}</div>
    </div>
  </div>`;
}

// Render all panels
const main = document.getElementById('mainContent');
main.innerHTML = Object.keys(LANGS).map(buildPanel).join('');

// ─────────────────────────────────────────────
// SWITCH LANGUAGE
// ─────────────────────────────────────────────
function switchLang(code) {
  document.querySelectorAll('.lang-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+code).classList.add('active');
  const btns = document.querySelectorAll('.lang-btn');
  const keys = Object.keys(LANGS);
  btns[keys.indexOf(code)].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────
// SWITCH SECTION
// ─────────────────────────────────────────────
function switchSection(code, sec, btn) {
  const panel = document.getElementById('panel-'+code);
  panel.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
  panel.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`sec-${code}-${sec}`).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
